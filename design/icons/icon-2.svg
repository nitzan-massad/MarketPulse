<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="MarketPulse — Candle Climb">
  <defs>
    <linearGradient id="c2-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8b53a"/>
      <stop offset="0.5" stop-color="#c8930f"/>
      <stop offset="1" stop-color="#a9780a"/>
    </linearGradient>
    <radialGradient id="c2-sheen" cx="0.3" cy="0.22" r="0.95">
      <stop offset="0" stop-color="#fbe39a" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#fbe39a" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#fbe39a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#c2-bg)"/>
  <rect width="1024" height="1024" fill="url(#c2-sheen)"/>

  <!-- three ascending candlesticks in deep ink -->
  <g fill="#1b1d18">
    <!-- candle 1 -->
    <rect x="222" y="500" width="14" height="300" rx="7"/>
    <rect x="178" y="556" width="102" height="180" rx="22"/>
    <!-- candle 2 -->
    <rect x="455" y="372" width="14" height="296" rx="7"/>
    <rect x="411" y="420" width="102" height="190" rx="22"/>
    <!-- candle 3 (tallest) -->
    <rect x="788" y="208" width="14" height="300" rx="7"/>
    <rect x="744" y="250" width="102" height="206" rx="22"/>
  </g>

  <!-- connecting trend line + arrowhead, in off-white for contrast -->
  <g fill="none" stroke="#faf9f5" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 229 470 L 462 342 L 795 178"/>
  </g>
  <path d="M 795 178 L 690 196 L 760 268 Z" fill="#faf9f5"/>
</svg>
