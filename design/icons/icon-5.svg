<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="MarketPulse — Chevron Stack">
  <defs>
    <linearGradient id="v5-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#212419"/>
      <stop offset="1" stop-color="#13150f"/>
    </linearGradient>
    <linearGradient id="v5-g1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8a6207"/>
      <stop offset="1" stop-color="#b9890f"/>
    </linearGradient>
    <linearGradient id="v5-g2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#b3820e"/>
      <stop offset="1" stop-color="#d7a52a"/>
    </linearGradient>
    <linearGradient id="v5-g3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#dca828"/>
      <stop offset="1" stop-color="#f6d566"/>
    </linearGradient>
    <radialGradient id="v5-glow" cx="0.5" cy="0.28" r="0.72">
      <stop offset="0" stop-color="#e9bf45" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#e9bf45" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#v5-bg)"/>
  <rect width="1024" height="1024" fill="url(#v5-glow)"/>

  <!-- three ascending chevrons; brightest on top, implying upward momentum -->
  <g fill="none" stroke-width="86" stroke-linecap="round" stroke-linejoin="round">
    <!-- bottom chevron (dimmest, widest) -->
    <path d="M 252 710 L 512 470 L 772 710" stroke="url(#v5-g1)" stroke-opacity="0.55"/>
    <!-- middle chevron -->
    <path d="M 272 588 L 512 372 L 752 588" stroke="url(#v5-g2)" stroke-opacity="0.82"/>
    <!-- top chevron (brightest) -->
    <path d="M 296 470 L 512 278 L 728 470" stroke="url(#v5-g3)"/>
  </g>
</svg>
