<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MarketPulse modals — desktop vs iPhone (full res)</title>
<style>
  body{font-family:"Archivo",system-ui,sans-serif;background:#e7e5dd;margin:0;padding:28px 28px 80px;color:#1b1d18}
  h1{font-family:Georgia,"Times New Roman",serif;font-size:26px;margin:0 0 4px}
  .sub{color:#6c7264;font-size:13px;margin-bottom:20px}
  .row{padding:26px 0 34px;border-bottom:1px solid #cfccc0}
  .name{margin:0 0 14px}
  .name b{font-size:18px}
  .name span{color:#6c7264;font-size:13px;margin-left:10px}
  .pane{display:flex;gap:44px;align-items:flex-start;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;gap:9px}
  .tag{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8b8f82;font-weight:700}
  /* 1:1 — no scaling, so text is full resolution */
  .desk iframe{width:920px;height:1000px;border:1px solid #d5d2c8;border-radius:12px;background:#fff;display:block}
  .phone .frame{width:390px;height:844px;border:9px solid #14140f;border-radius:42px;overflow:hidden;box-shadow:0 14px 40px rgba(27,29,24,.30);background:#000}
  .phone iframe{width:390px;height:844px;border:0;display:block}
</style>
</head>
<body>
  <h1>MarketPulse — stock modal mockups</h1>
  <div class="sub">Full-resolution (1:1). Desktop + iPhone render of each concept, live, real NVDA data. Scroll inside each frame to see the whole modal.</div>
  <div id="rows"></div>
<script>
  const MODALS = [
    ["1","Ticket","Compact · Chart / Analysts / Stats tabs"],
    ["2","Dashboard","Chart hero + analyst panels + key-stats"],
    ["3","Editorial","Magazine spread + chart plate"],
    ["4","Terminal","Dark mktpulse:// popover"],
    ["5","Graphical","Gauges + consensus donut + 52-wk range"],
  ];
  document.getElementById("rows").innerHTML = MODALS.map(([n,name,desc]) => `
    <div class="row">
      <div class="name"><b>${n}. ${name}</b><span>${desc}</span></div>
      <div class="pane">
        <div class="col desk"><div class="tag">Desktop</div><iframe src="modal-${n}.html" loading="lazy"></iframe></div>
        <div class="col phone"><div class="tag">iPhone</div><div class="frame"><iframe src="modal-${n}.html" loading="lazy"></iframe></div></div>
      </div>
    </div>`).join("");
</script>
</body>
</html>
