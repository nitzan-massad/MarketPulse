name: Refresh data & deploy

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:         # manual run button
  push:
    branches: [main]         # redeploy on code changes

permissions:
  contents: write   # commit refreshed data
  pages: write      # deploy Pages
  id-token: write   # Pages OIDC

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      # Pull a fresh TipRanks snapshot via FlareSolverr (solves Cloudflare from
      # the runner's datacenter IP). Skipped on plain code pushes. A blocked
      # fetch fails this step but NOT the run — the site still deploys last data.
      - name: Refresh TipRanks snapshot (via FlareSolverr)
        if: github.event_name != 'push'
        continue-on-error: true
        env:
          FLARESOLVERR_URL: http://localhost:8191/v1
        run: node scripts/refresh-data-ci.mjs

      - name: Commit refreshed data
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src/data; then
            echo "No data change."
          else
            git add src/data
            git commit -m "chore: refresh TipRanks snapshot [skip ci]"
            git push
          fi

      - name: Build
        env:
          VITE_FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          VITE_TWELVEDATA_KEY: ${{ secrets.TWELVEDATA_KEY }}
          VITE_FMP_KEY: ${{ secrets.FMP_KEY }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
